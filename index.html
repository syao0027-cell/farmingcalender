<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>農業管理アプリ</title>
    <link rel="stylesheet" href="style.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <main id="app-container">
        <section id="today-task" class="card">
            <h2>本日の作業</h2>
            <h3>未達成</h3>
            <div id="todo-list"></div>
            <h3>完了</h3>
            <div id="done-list"></div>
        </section>
        
        <section id="calendar" class="card">
            <div id="calendar-view"></div>
        </section>
    </main>

    <div id="entry-form" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 id="form-title">作業記録</h3>
            <input type="hidden" id="edit-task-id">
            <label>作物:</label>
            <select id="task-crop"></select>
            <label>担当者:</label>
            <select id="task-member"></select>
            <label>エリア:</label>
            <select id="task-area"></select>
            <label>日付:</label>
            <input type="date" id="task-date">
            <label>作業内容:</label>
            <input type="text" id="task-text">
            <label>メモ:</label>
            <input type="text" id="task-memo" placeholder="備考など">
            <button id="save-btn" onclick="saveTask()">保存</button>
            <button id="update-btn" onclick="updateTask()" style="display:none;">更新</button>
            <button id="delete-btn" onclick="deleteTask()" style="display:none; background:#ff5252; color:white;">削除</button>
            <button onclick="closeForm()">閉じる</button>
        </div>
    </div>
      
<div id="settings-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>設定</h2>

            <div class="tab-buttons" style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button type="button" class="tab-btn active" onclick="switchTab('crop-tab')">作物</button>
                <button type="button" class="tab-btn" onclick="switchTab('member-tab')">担当者</button>
                <button type="button" class="tab-btn" onclick="switchTab('area-tab')">エリア</button>
            </div>

            <div id="crop-tab" class="tab-content">
                <h3>作物管理</h3>
                <input type="text" id="new-crop" placeholder="作物名">
                <input type="color" id="new-color" value="#4caf50">
                <button onclick="addCategory()">追加</button>
                <div id="crop-list" style="margin:15px 0;"></div>
            </div>

            <div id="member-tab" class="tab-content" style="display: none;">
                <h3>担当者管理</h3>
                <input type="text" id="new-member" placeholder="担当者名">
                <button onclick="addMember()">追加</button>
                <div id="member-list" style="margin:15px 0;"></div>
            </div>

            <div id="area-tab" class="tab-content" style="display: none;">
                <h3>エリア管理</h3>
                <input type="text" id="new-area" placeholder="エリア名">
                <button onclick="addArea()">追加</button>
                <div id="area-list" style="margin:15px 0;"></div>
            </div>

            <hr>
            <button onclick="closeSettings()">閉じる</button>
        </div>
    </div>

    <nav class="fab-nav">
        <button class="fab-btn" onclick="openForm()">＋</button>
        <button class="fab-btn" onclick="openSettings()">⚙️</button>
    </nav>
    <script src="script.js"></script>
</body>
</html>
